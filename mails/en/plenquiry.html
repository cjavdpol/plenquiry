<!DOCTYPE html PUBLIC "-//W3C//DTD HTML 4.01//EN" "http://www.w3.org/TR/1999/REC-html401-19991224/strict.dtd">
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
  <title>Question about: {page_title}</title>
  <style>
    body { font-family: Open-sans, sans-serif; color: #555454; font-size: 13px; line-height: 18px; background: #fff; margin: auto; width: 650px; }
    .table-mail { width: 100%; margin-top: 10px; }
    .logo { border-bottom: 4px solid #333333; padding: 7px 0; text-align: center; }
    .logo img { max-height: 60px; }
    .titleblock { padding: 14px 0; text-align: center; }
    .title { font-size: 24px; font-weight: 500; }
    .box { border: 1px solid #D6D4D4; background-color: #f8f8f8; padding: 14px; }
    .footer { border-top: 4px solid #333333; padding: 7px 0; font-size: 12px; text-align: center; }
    a { color: #337ff1; }
    .label { color: #999; font-size: 11px; text-transform: uppercase; }
    .question-box { background: #ffffff; border: 1px solid #e0e0e0; padding: 12px; margin-top: 10px; white-space: pre-wrap; }
  </style>
</head>
<body>
<table class="table-mail">
  <tr>
    <td width="20">&nbsp;</td>
    <td>
      <table style="width:100%">
        <tr>
          <td class="logo">
            <a title="{shop_name}" href="{shop_url}">
              <img src="{shop_logo}" alt="{shop_name}">
            </a>
          </td>
        </tr>
        <tr>
          <td class="titleblock">
            <span class="title">A question was asked on this page:</span>
          </td>
        </tr>
        <tr>
          <td class="box">
            <p class="label">Page</p>
            <p><a href="{page_url}">{page_title}</a></p>

            <p class="label">From</p>
            <p>{firstname} &lt;{email}&gt;</p>

            <p class="label">Question</p>
            <div class="question-box">{question}</div>
          </td>
        </tr>
        <tr>
          <td class="footer">
            <a href="{shop_url}">{shop_name}</a>
          </td>
        </tr>
      </table>
    </td>
    <td width="20">&nbsp;</td>
  </tr>
</table>
</body>
</html>
